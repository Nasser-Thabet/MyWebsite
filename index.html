<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ImportantLinks</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f7f7f7; margin:20px; }
.container { display:flex; gap:20px; }
.links,.form { background:white; padding:15px; border-radius:8px; width:50%; }
ul { list-style:none; padding-left:15px; }
li { margin:6px 0; }
a { color:#1a73e8; text-decoration:none; }
button { margin-left:6px; cursor:pointer; }
input,select { width:100%; padding:6px; margin-top:6px; }
.search { margin-bottom:10px; }
#error { color:red; margin-bottom:10px; }
</style>
</head>

<body>

<h1>ImportantLinks</h1>
<div id="error"></div>

<div class="container">
  <div class="links">
    <input id="search" class="search" placeholder="Search…" oninput="render()" />
    <div id="links"></div>
  </div>

  <div class="form">
    <h3>Add / Edit Link</h3>
    <input id="title" placeholder="Title">
    <input id="url" placeholder="https://example.com">
    <select id="category">
      <option>Work</option>
      <option>Personal</option>
    </select>
    <input id="subcategory" placeholder="Subcategory">
    <input type="hidden" id="editId">
    <button onclick="saveLink()">Save</button>
  </div>
</div>

<script>
/************ CONFIG ************/
const SITE_PASSWORD = "nasser123";
const SUPABASE_URL = "https://owvbotnkzekyotgzcbxs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_X1s0toNlANVtRWxXHQt1xA_Wh_DRut4";
/********************************/

const errorBox = document.getElementById("error");
const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/************ PASSWORD LOCK ************/
(function () {
  if (sessionStorage.getItem("ok")==="1") return;
  if (prompt("Password:") !== SITE_PASSWORD) {
    errorBox.textContent = "Access denied.";
    throw new Error("Denied");
  }
  sessionStorage.setItem("ok","1");
})();
/*************************************/

let allLinks = [];

/************ LOAD ************/
async function loadLinks() {
  const { data, error } = await supabase
    .from("links")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    errorBox.textContent = error.message;
    return;
  }
  allLinks = data;
  render();
}

/************ SAVE ************/
async function saveLink() {
  const t=title.value.trim(), u=url.value.trim(), s=subcategory.value.trim();
  const c=category.value;

  if (!t || !u || !s) return alert("Fill all fields");

  if (editId.value) {
    await supabase.from("links").update({
      title:t, url:u, category:c, subcategory:s
    }).eq("id", editId.value);
    editId.value="";
  } else {
    await supabase.from("links").insert({
      title:t, url:u, category:c, subcategory:s
    });
  }

  title.value=url.value=subcategory.value="";
  loadLinks();
}

/************ UI ************/
function editLink(l) {
  title.value=l.title;
  url.value=l.url;
  category.value=l.category;
  subcategory.value=l.subcategory;
  editId.value=l.id;
}

async function deleteLink(id) {
  if (!confirm("Delete?")) return;
  await supabase.from("links").delete().eq("id", id);
  loadLinks();
}

function render() {
  const q = search.value.toLowerCase();
  links.innerHTML = "";

  const grouped = {};
  allLinks.forEach(l => {
    if (
      !l.title.toLowerCase().includes(q) &&
      !l.url.toLowerCase().includes(q)
    ) return;

    grouped[l.category] ??= {};
    grouped[l.category][l.subcategory] ??= [];
    grouped[l.category][l.subcategory].push(l);
  });

  for (const cat in grouped) {
    for (const sub in grouped[cat]) {
      links.innerHTML += `<h3>${cat} / ${sub}</h3><ul>`;
      grouped[cat][sub].forEach(l => {
        links.innerHTML += `
          <li>
            <a href="${l.url}" target="_blank">${l.title}</a>
            <button onclick='editLink(${JSON.stringify(l)})'>✏️</button>
            <button onclick='deleteLink("${l.id}")'>🗑</button>
          </li>`;
      });
      links.innerHTML += "</ul>";
    }
  }
}

loadLinks();
</script>

</body>
</html>
